name: Release & Docker Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- 后端构建 ----
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        run: |
          cd SpringBoot
          mvn clean package -DskipTests -q

      # ---- 前端构建 ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - name: Build Frontend
        run: |
          cd vue
          npm ci
          npm run build

      # ---- 打包 Release ----
      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          zip -r memopad-${{ steps.version.outputs.tag }}.zip \
            SpringBoot/target/*.jar \
            vue/dist/ \
            sql/ \
            README.md \
            docker-compose.yml \
            Dockerfile

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Memo Pad ${{ steps.version.outputs.tag }}
          body: |
            ## Memo Pad ${{ steps.version.outputs.tag }}

            ### 下载
            - `memopad-${{ steps.version.outputs.tag }}.zip` — 完整项目包
            - `memopad.jar` — 后端 JAR（可直接运行）

            ### 快速启动
            ```bash
            # 1. 初始化数据库
            mysql -u root -p < sql/init.sql

            # 2. 修改配置
            # 编辑 SpringBoot/src/main/resources/application.yml

            # 3. 运行
            java -jar memopad.jar
            # 前端访问 http://localhost:5173
            ```
          files: |
            SpringBoot/target/memopad-0.0.1-SNAPSHOT.jar
            memopad-${{ steps.version.outputs.tag }}.zip
          draft: false
          prerelease: false

      # ---- Docker 镜像构建 ----
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
