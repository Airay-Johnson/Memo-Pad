name: Release & Docker Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        run: mvn clean package -DskipTests -q
        working-directory: SpringBoot

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          zip -r memopad-${{ steps.version.outputs.tag }}.zip \
            SpringBoot/target/*.jar \
            sql/ \
            README.md \
            docker-compose.yml \
            Dockerfile

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Memo Pad ${{ steps.version.outputs.tag }}
          files: |
            SpringBoot/target/memopad-0.0.1-SNAPSHOT.jar
            memopad-${{ steps.version.outputs.tag }}.zip
          draft: false
          prerelease: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
