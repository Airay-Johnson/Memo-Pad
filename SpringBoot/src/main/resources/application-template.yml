server:
  port: 9999

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: your-mysql-password
    url: jdbc:mysql://localhost:3306/memopad?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true

mybatis:
  mapper-locations: classpath:org/example/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

ai:
  api-key: ${MEMOPAD_AI_API_KEY:your-dashscope-api-key}
  api-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-plus

langchain4j:
  openai:
    chat-model:
      base-url: ${ai.api-url}
      api-key: ${ai.api-key}
      model-name: ${ai.model}
      temperature: 0.7
      max-tokens: 2048
      timeout: 60s
    streaming-chat-model:
      base-url: ${ai.api-url}
      api-key: ${ai.api-key}
      model-name: ${ai.model}
      temperature: 0.5
      max-tokens: 4096
      timeout: 120s

rag:
  datasource:
    jdbc-url: jdbc:postgresql://localhost:5432/memopad_rag
    username: memopad
    password: memopad123
    driver-class-name: org.postgresql.Driver
